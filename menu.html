<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* HERO BACKGROUND */
.hero{
    height:100vh;
    
    background:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4")
    center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:50px;
    font-weight:bold;
    text-shadow:2px 2px 10px black;
}

/* IMAGE SLIDER */
.slider{
    background:#111;
    padding:40px;
    text-align:center;
}

.slider img{
    width:60%;
    border-radius:20px;
    transition:0.5s;
}

/* MENU SECTION */
.menu{
    background:white;
    padding:60px;
    text-align:center;
}

.item{
    margin:20px;
    font-size:20px;
}

/* BUTTON */
button{
    background:#ff6347;
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin-left:10px;
}

button:hover{
    background:#ff3b1f;
}

/* CART DISPLAY */
.cart{
    position:fixed;
    top:10px;
    right:20px;
    background:black;
    color:white;
    padding:10px 15px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="cart">
Cart: <span id="cartCount">0</span>
</div>

<div class="hero">
Welcome
</div>

<div class="slider">
<img id="slideImage" src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
</div>

<div class="menu">
<h2>Menu</h2>

<div class="item">
Pizza — ₹250
<button onclick="addToCart(250)">Add to Cart</button>
</div>

<div class="item">
Burger — ₹150
<button onclick="addToCart(150)">Add to Cart</button>
</div>

<div class="item">
Pasta — ₹200
<button onclick="addToCart(200)">Add to Cart</button>
</div>

<button onclick="checkout()">Checkout</button>
</div>


<script>
/* AUTO IMAGE SLIDER */
const images = [
"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=800",
"https://images.unsplash.com/photo-1550547660-d9450f859349?w=800",
"https://images.unsplash.com/photo-1608897013039-887f21d8c804?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8cGFzdGF8ZW58MHx8MHx8fDA%3D?w=800"
];

let index = 0;

setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slideImage").src = images[index];
}, 2000);

/* ADD TO CART */
/* ADD TO CART */
let totalPrice = 0;

function addToCart(price){
    totalPrice += price;
    document.getElementById("cartCount").textContent = totalPrice;
}

function checkout(){
    alert("Total Amount: ₹" + totalPrice);
    totalPrice = 0;
    document.getElementById("cartCount").textContent = totalPrice;
}

</script>

</body>
</html>
