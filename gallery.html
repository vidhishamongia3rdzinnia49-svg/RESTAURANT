<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
}

/* NAVBAR */
nav{
    background:black;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-weight:bold;
}

nav a:hover{
    color:#ff6347;
}

/* HEADER */
.header{
    text-align:center;
    padding:50px 20px;
}

.header h1{
    font-size:40px;
}

/* GALLERY GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.08);
}
</style>
</head>

<body>

<nav>
<a href="capstone.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<div class="header">
<h1>Our Delicious Moments</h1>
</div>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=800">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=800">
<img src="https://images.unsplash.com/photo-1608897013039-887f21d8c804?w=800">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800">


</div>

</body>
</html>
